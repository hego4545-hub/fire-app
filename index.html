<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire Gym | Smart App</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #e53935; --bg: #121212; --surface: #1e1e1e; --text: #fff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo', sans-serif; }
        body { background:var(--bg); color:var(--text); text-align:center; padding-top:50px; }
        .card { background:var(--surface); padding:30px; border-radius:30px; margin:20px; border:1px solid #333; }
        input { width:90%; padding:15px; margin:20px 0; border-radius:15px; border:none; background:#000; color:#fff; text-align:center; font-size:18px; }
        .btn { width:90%; padding:15px; border-radius:15px; border:none; background:var(--primary); color:#fff; font-weight:900; font-size:18px; }
    </style>
</head>
<body>
    <div id="auth">
        <div class="card">
            <h1 style="color:var(--primary); font-size:45px;">FIRE GYM</h1>
            <input type="tel" id="p" placeholder="رقم موبايلك يا بطل">
            <button class="btn" onclick="l()">دخول 🔥</button>
        </div>
    </div>
    <div id="app" style="display:none;">
        <div class="card">
            <h2>أهلاً بيك في المنصة 👋</h2>
            <div class="card" style="background:#b71c1c; margin-top:30px;">
                <h3>عداد المية 💧</h3>
                <h1 id="c">0</h1>
                <button class="btn" style="background:rgba(255,255,255,0.2);" onclick="a()">+1 كوب</button>
            </div>
        </div>
    </div>
    <script>
        let w=0;
        function l(){
            if(document.getElementById('p').value.length<10) return alert('الرقم غلط!');
            document.getElementById('auth').style.display='none';
            document.getElementById('app').style.display='block';
        }
        function a(){ w++; document.getElementById('c').innerText=w; }
    </script>
</body>
</html>
